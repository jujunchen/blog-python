<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="{% block meta_description %}{% endblock %}">
    <title>{% block title %}{{ config.APP_NAME }}{% endblock %}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Source+Serif+Pro:wght@400;600&display=swap" rel="stylesheet">

    <!-- 主题样式 -->
    <link rel="stylesheet" href="/static/css/themes/{{ theme | default('light') }}/main.css">

    <!-- 额外样式 -->
    {% block extra_css %}{% endblock %}
</head>
<body>
    <!-- 导航栏 -->
    <nav class="navbar">
        <div class="container">
            <a href="/" class="logo">{{ config.APP_NAME }}</a>
            <ul class="nav-menu">
                <li><a href="/">首页</a></li>
                <li><a href="/archives">归档</a></li>
                <li><a href="/search">搜索</a></li>
                {% block nav_extra %}{% endblock %}
            </ul>
        </div>
    </nav>

    <!-- 主内容 -->
    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <p>&copy; {{ now().year }} {{ config.APP_NAME }}. All rights reserved.</p>
            <p>
                <a href="/sitemap.xml">站点地图</a> |
                <a href="/robots.txt">ROBOTS</a>
            </p>
        </div>
    </footer>

    <!-- JavaScript -->
    <script>
        // 主题切换功能已移至后台管理
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
