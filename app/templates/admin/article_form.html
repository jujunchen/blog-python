{% extends "layouts/admin_base.html" %}

{% block title %}{{ '编辑' if article else '新建' }}文章 - {{ config.APP_NAME }}{% endblock %}

{% block content %}
<div class="container">
    <h1>{{ '编辑' if article else '新建' }}文章</h1>

    <form method="post" action="{{ '/admin/articles/' + article.id|string + '/edit' if article else '/admin/articles/new' }}">
        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

        <div class="form-row">
            <div class="form-group">
                <label for="title">标题 *</label>
                <input type="text" id="title" name="title" value="{{ article.title if article else '' }}" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="slug">URL Slug *</label>
                <input type="text" id="slug" name="slug" value="{{ article.slug if article else '' }}" required>
            </div>
            <div class="form-group">
                <label for="category_id">分类</label>
                <select id="category_id" name="category_id">
                    <option value="">请选择</option>
                    {% for cat in categories %}
                    <option value="{{ cat.id }}" {% if article and article.category_id == cat.id %}selected{% endif %}>
                        {{ cat.name }}
                    </option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group full">
                <label for="summary">摘要</label>
                <textarea id="summary" name="summary" rows="3">{{ article.summary if article else '' }}</textarea>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group full">
                <label for="markdown_content">Markdown 内容 * <small class="hint-text">(支持 Ctrl+V 粘贴图片自动上传)</small></label>

                <!-- Markdown 快捷工具栏 -->
                <div class="md-toolbar">
                    <button type="button" data-markdown="# " title="一级标题">H1</button>
                    <button type="button" data-markdown="## " title="二级标题">H2</button>
                    <button type="button" data-markdown="### " title="三级标题">H3</button>
                    <span class="toolbar-divider"></span>
                    <button type="button" data-markdown="**{{selected}}**" title="粗体">B</button>
                    <button type="button" data-markdown="*{{selected}}*" title="斜体">I</button>
                    <button type="button" data-markdown="~~{{selected}}~~" title="删除线">S</button>
                    <span class="toolbar-divider"></span>
                    <button type="button" data-markdown="> " title="引用">引用</button>
                    <button type="button" data-markdown="`{{selected}}`" title="行内代码">代码</button>
                    <button type="button" data-markdown="```&#10;{{selected}}&#10;```" title="代码块">代码块</button>
                    <span class="toolbar-divider"></span>
                    <button type="button" data-markdown="- " title="无序列表">列表</button>
                    <button type="button" data-markdown="- [ ] " title="任务列表">任务</button>
                    <button type="button" data-markdown="| 表头 | 表头 |&#10;| ---- | ---- |&#10;| 内容 | 内容 |" title="插入表格">表格</button>
                    <span class="toolbar-divider"></span>
                    <button type="button" data-markdown="[{{selected}}](https://)" title="链接">链接</button>
                    <button type="button" data-markdown="![{{selected}}](https://)" title="图片">图片</button>
                </div>

                <!-- 编辑器与预览区域 -->
                <div class="md-editor-container">
                    <div class="md-editor-pane">
                        <div class="pane-label">编辑</div>
                        <textarea id="markdown_content" name="markdown_content" required>{{ article.markdown_content if article else '' }}</textarea>
                    </div>
                    <div class="md-splitter"></div>
                    <div class="md-preview-pane">
                        <div class="pane-label">预览</div>
                        <div id="markdown_preview" class="md-preview-content"></div>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label for="cover_image">封面图片 URL</label>
                <input type="text" id="cover_image" name="cover_image" value="{{ article.cover_image if article else '' }}">
            </div>
            <div class="form-group">
                <label for="status">状态</label>
                <select id="status" name="status">
                    <option value="draft" {% if article and article.status == 'draft' %}selected{% endif %}>草稿</option>
                    <option value="published" {% if article and article.status == 'published' %}selected{% endif %}>已发布</option>
                </select>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group full">
                <label for="tags">标签（用逗号分隔）</label>
                <input type="text" id="tags" name="tags" value="{{ article_tags | join(', ') if article else '' }}">
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn-primary">保存</button>
            <a href="/admin/articles" class="btn-secondary">取消</a>
        </div>
    </form>
</div>
{% endblock %}

{% block extra_js %}
<!-- Markdown 解析库 -->
<script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>
<!-- Markdown 编辑器 -->
<script src="/static/js/markdown-editor.js"></script>
{% endblock %}
