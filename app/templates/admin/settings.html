{% extends "layouts/admin_base.html" %}

{% block title %}系统设置 - {{ config.APP_NAME }}{% endblock %}

{% block content %}
<div class="container">
    <h1>系统设置</h1>

    <div class="settings-grid">
        <!-- 主题设置 -->
        <section class="settings-section">
            <h2>主题设置</h2>
            <div class="setting-item">
                <label>当前主题</label>
                <select id="theme-select">
                    <option value="light" {% if theme_setting.current_theme == 'light' %}selected{% endif %}>极简亮色</option>
                    <option value="dark" {% if theme_setting.current_theme == 'dark' %}selected{% endif %}>极简暗色</option>
                    <option value="forest" {% if theme_setting.current_theme == 'forest' %}selected{% endif %}>森林绿境</option>
                    <option value="ocean" {% if theme_setting.current_theme == 'ocean' %}selected{% endif %}>深海蓝调</option>
                    <option value="earth" {% if theme_setting.current_theme == 'earth' %}selected{% endif %}>暖沙大地</option>
                    <option value="twilight" {% if theme_setting.current_theme == 'twilight' %}selected{% endif %}>紫暮霞光</option>
                    <option value="ink" {% if theme_setting.current_theme == 'ink' %}selected{% endif %}>墨韵东方</option>
                </select>
                <button onclick="updateTheme()" class="btn-save">保存</button>
            </div>
        </section>

        <!-- 评论设置 -->
        <section class="settings-section">
            <h2>评论设置</h2>
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="allow-registered" {% if comment_config.allow_registered_comments %}checked{% endif %}>
                    允许注册用户评论
                </label>
            </div>
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="allow-anonymous" {% if comment_config.allow_anonymous_comments %}checked{% endif %}>
                    允许匿名评论
                </label>
            </div>
            <div class="setting-item">
                <label>
                    <input type="checkbox" id="require-approval" {% if comment_config.require_approval %}checked{% endif %}>
                    评论需要审核
                </label>
            </div>
            <button onclick="updateCommentConfig()" class="btn-save">保存</button>
        </section>
    </div>
</div>

{% block extra_js %}
<script>
async function updateTheme() {
    const theme = document.getElementById('theme-select').value;
    console.log('[DEBUG] 正在保存主题:', theme);
    try {
        const response = await fetch('/admin/settings/theme', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
            },
            body: `theme=${encodeURIComponent(theme)}`
        });
        const result = await response.json();
        console.log('[DEBUG] 服务器响应:', result);
        if (response.ok) {
            alert('主题已更新为: ' + result.theme);
            location.reload();
        } else {
            alert('保存失败: ' + (result.detail || '未知错误'));
        }
    } catch (error) {
        console.error('[ERROR] 请求失败:', error);
        alert('保存失败: ' + error.message);
    }
}

async function updateCommentConfig() {
    const allowRegistered = document.getElementById('allow-registered').checked;
    const allowAnonymous = document.getElementById('allow-anonymous').checked;
    const requireApproval = document.getElementById('require-approval').checked;

    try {
        const response = await fetch('/admin/settings/comment', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: `allow_registered=${allowRegistered}&allow_anonymous=${allowAnonymous}&require_approval=${requireApproval}`
        });
        if (response.ok) {
            alert('设置已保存');
        }
    } catch (error) {
        alert('保存失败');
    }
}
</script>
{% endblock %}

{% endblock %}
